<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141922"/>
      <stop offset="1" stop-color="#0A0D13"/>
    </linearGradient>
    <linearGradient id="spike" x1="256" y1="120" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6B3D"/>
      <stop offset="1" stop-color="#F5333C"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="110" fill="none" stroke="#2A3242" stroke-width="2"/>

  <!-- baseline monitor line with a caught regression spike -->
  <g filter="url(#glow)">
    <path d="M84 300 H180 L212 300 L236 300"
          stroke="#E6EDF3" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M236 300 L268 156 L300 300"
          stroke="url(#spike)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M300 300 L324 300 L356 300 H428"
          stroke="#E6EDF3" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- apex marker -->
  <circle cx="268" cy="156" r="15" fill="#FF6B3D"/>
  <circle cx="268" cy="156" r="15" fill="none" stroke="#0A0D13" stroke-width="4"/>
</svg>
